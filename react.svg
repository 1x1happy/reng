.app-shell {
  display: grid;
  gap: 32px;
  padding: 32px;
  min-height: 100svh;
}

.registration-page {
  height: 100svh;
  overflow: hidden;
  padding: 24px;
}

.hero-section {
  position: relative;
  display: grid;
  grid-template-columns: minmax(0, 1fr) 380px;
  gap: 28px;
  min-height: 540px;
  padding: 64px;
  overflow: hidden;
  border: 1px solid var(--stroke);
  border-radius: 42px;
  background:
    radial-gradient(circle at 14% 24%, rgba(144, 166, 211, 0.34), transparent 30%),
    radial-gradient(circle at 82% 16%, rgba(207, 150, 112, 0.22), transparent 28%),
    linear-gradient(135deg, #fdf7f4 0%, #eef3ff 100%);
  box-shadow: var(--shadow);
}

.registration-page .hero-section {
  min-height: 0;
  height: calc(100svh - 48px);
  padding: 44px;
}

.hero-section::after {
  content: '';
  position: absolute;
  right: 34%;
  bottom: -120px;
  width: 280px;
  height: 280px;
  border: 34px solid rgba(217, 160, 83, 0.38);
  border-radius: 50%;
  transform: rotate(-18deg);
}

.hero-copy {
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  max-width: 760px;
}

.eyebrow {
  margin: 0 0 14px;
  color: var(--blue);
  font-size: 13px;
  font-weight: 800;
  letter-spacing: 0.12em;
  text-transform: uppercase;
}

.hero-copy h1 {
  max-width: 720px;
  margin: 0;
  color: var(--ink);
  font-size: clamp(48px, 5vw, 82px);
  line-height: 0.95;
  letter-spacing: -0.06em;
}

.registration-page .hero-copy h1 {
  font-size: clamp(44px, 4.6vw, 70px);
}

.hero-text {
  max-width: 620px;
  margin: 26px 0 0;
  color: var(--muted);
  font-size: 20px;
  line-height: 1.65;
}

.hero-actions {
  display: flex;
  gap: 14px;
  margin-top: 34px;
}

.registration-page .hero-text {
  margin-top: 20px;
  font-size: 18px;
  line-height: 1.55;
}

.registration-page .hero-actions {
  margin-top: 24px;
}

.primary-button,
.secondary-button,
.wide-button,
.message-form button,
.captcha-card button {
  border: 0;
  border-radius: 999px;
  font: inherit;
  font-weight: 800;
  text-decoration: none;
  cursor: pointer;
}

.primary-button,
.wide-button,
.message-form button {
  color: #fff;
  background: var(--blue);
  box-shadow: 0 16px 30px rgba(137, 160, 211, 0.32);
}

.primary-button,
.secondary-button {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 15px 24px;
}

.secondary-button {
  color: var(--brown);
  border: 1px solid rgba(178, 118, 78, 0.26);
  background: rgba(255, 255, 255, 0.68);
}

.login-card,
.sidebar,
.chat-panel,
.insights > *,
.features article {
  border: 1px solid var(--stroke);
  background: rgba(255, 251, 248, 0.86);
  box-shadow: var(--shadow);
  backdrop-filter: blur(18px);
}

.login-card {
  position: relative;
  z-index: 1;
  align-self: center;
  display: grid;
  gap: 15px;
  padding: 30px;
  border-radius: 34px;
}

.registration-page .login-card {
  gap: 10px;
  padding: 22px;
}

.brand-mark {
  display: grid;
  width: 86px;
  height: 86px;
  margin: 0 auto 2px;
  place-items: center;
  border-radius: 28px;
  background: var(--blue);
}

.registration-page .brand-mark {
  width: 64px;
  height: 64px;
  border-radius: 22px;
}

.brand-mark span {
  width: 52px;
  height: 28px;
  border-radius: 50%;
  background: #fff;
  box-shadow:
    -28px 0 0 -12px #fff,
    28px 0 0 -12px #fff;
}

.registration-page .brand-mark span {
  width: 40px;
  height: 22px;
  box-shadow:
    -21px 0 0 -9px #fff,
    21px 0 0 -9px #fff;
}

.login-card h2 {
  margin: 0 0 6px;
  color: var(--ink);
  text-align: center;
  font-size: 34px;
}

.registration-page .login-card h2 {
  font-size: 28px;
}

.login-card label {
  display: grid;
  gap: 8px;
  color: var(--muted);
  font-size: 14px;
  font-weight: 700;
}

input {
  width: 100%;
  box-sizing: border-box;
  border: 1px solid rgba(95, 88, 84, 0.18);
  border-radius: 14px;
  background: rgba(255, 255, 255, 0.8);
  color: var(--ink);
  font: inherit;
  outline: none;
}

.login-card input {
  padding: 14px 16px;
}

.registration-page .login-card input {
  padding: 10px 14px;
}

input:focus {
  border-color: var(--blue);
  box-shadow: 0 0 0 4px rgba(143, 165, 211, 0.18);
}

.wide-button,
.social-button {
  min-height: 46px;
}

.registration-page .wide-button,
.registration-page .social-button {
  min-height: 40px;
}

.social-button {
  border: 1px solid rgba(95, 88, 84, 0.18);
  border-radius: 999px;
  color: var(--muted);
  background: transparent;
  font: inherit;
  font-weight: 700;
  cursor: pointer;
}

.divider {
  color: #b5aaa3;
  font-size: 13px;
  text-align: center;
}

.workspace {
  display: grid;
  grid-template-columns: 260px minmax(430px, 1fr) 320px;
  gap: 24px;
  align-items: stretch;
  min-height: 0;
}

.chat-page {
  height: 100svh;
  overflow: hidden;
}

.chat-page .workspace {
  height: calc(100svh - 64px);
}

.sidebar,
.chat-panel,
.insights > * {
  border-radius: 30px;
}

.sidebar {
  display: flex;
  flex-direction: column;
  gap: 26px;
  padding: 26px;
}

.sidebar h2,
.panel-header h2,
.status-card h2,
.captcha-card h3,
.features h3 {
  margin: 0;
  color: var(--ink);
}

.menu {
  display: grid;
  gap: 10px;
}

.menu button {
  border: 0;
  padding: 13px 14px;
  border-radius: 16px;
  color: var(--muted);
  background: transparent;
  font: inherit;
  font-weight: 750;
  text-align: left;
  text-decoration: none;
  cursor: pointer;
}

.menu button.active,
.menu button:hover {
  color: var(--ink);
  background: #eef3ff;
}

.owl-card {
  margin-top: auto;
  padding: 18px;
  border-radius: 26px;
  background: #f4d8be;
  color: #76523d;
  font-weight: 700;
}

.owl {
  position: relative;
  width: 112px;
  height: 132px;
  margin: 0 auto 14px;
  border-radius: 52% 52% 44% 44%;
  background: #c89a64;
}

.owl::before,
.owl::after {
  content: '';
  position: absolute;
  top: 44px;
  width: 42px;
  height: 58px;
  border-radius: 50%;
  background: #f3d49d;
}

.owl::before {
  left: 16px;
}

.owl::after {
  right: 16px;
}

.owl-eye {
  position: absolute;
  z-index: 1;
  top: 58px;
  width: 16px;
  height: 16px;
  border-radius: 50%;
  background: #5f4436;
}

.owl-eye.left {
  left: 30px;
}

.owl-eye.right {
  right: 30px;
}

.owl-beak {
  position: absolute;
  z-index: 2;
  top: 78px;
  left: 50%;
  width: 0;
  height: 0;
  border-top: 16px solid #e5a143;
  border-right: 10px solid transparent;
  border-left: 10px solid transparent;
  transform: translateX(-50%);
}

.chat-panel {
  display: flex;
  flex-direction: column;
  min-height: 0;
  padding: 26px;
  overflow: hidden;
  background:
    linear-gradient(rgba(143, 165, 211, 0.86), rgba(143, 165, 211, 0.86)),
    radial-gradient(circle at 20% 72%, rgba(247, 221, 193, 0.72), transparent 30%);
}

.panel-header {
  display: flex;
  justify-content: space-between;
  gap: 20px;
  padding-bottom: 20px;
  border-bottom: 1px solid rgba(255, 255, 255, 0.35);
}

.panel-header h2 {
  color: #fff;
  font-size: 38px;
}

.panel-header .eyebrow {
  color: rgba(255, 255, 255, 0.76);
}

.icon-button {
  min-width: 48px;
  height: 48px;
  padding: 0 18px;
  border: 0;
  border-radius: 16px;
  color: #fff;
  background: rgba(255, 255, 255, 0.18);
  font-size: 15px;
  font-weight: 800;
  cursor: pointer;
}

.notice-card {
  margin-top: 22px;
  padding: 18px;
  border: 1px solid rgba(255, 255, 255, 0.42);
  border-radius: 22px;
  color: #fff;
  background: rgba(255, 255, 255, 0.16);
}

.notice-card p {
  margin: 8px 0 0;
}

.messages {
  display: grid;
  align-content: start;
  gap: 14px;
  margin-top: 24px;
  min-height: 0;
  overflow-y: auto;
  padding-right: 8px;
  flex: 1;
  overscroll-behavior: contain;
}

.messages::-webkit-scrollbar,
.content-panel::-webkit-scrollbar {
  width: 8px;
}

.messages::-webkit-scrollbar-thumb,
.content-panel::-webkit-scrollbar-thumb {
  border-radius: 999px;
  background: rgba(255, 255, 255, 0.42);
}

.message {
  max-width: 74%;
  padding: 16px 18px;
  border-radius: 22px;
  color: var(--ink);
  background: rgba(255, 255, 255, 0.88);
}

.message.user {
  justify-self: end;
  color: #fff;
  background: rgba(177, 113, 82, 0.78);
}

.message span {
  display: block;
  margin-bottom: 6px;
  font-size: 12px;
  font-weight: 850;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  opacity: 0.7;
}

.message p {
  margin: 0;
}

.message-form {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 12px;
  padding-top: 24px;
}

.message-form input {
  min-height: 54px;
  padding: 0 18px;
}

.message-form button {
  padding: 0 24px;
}

.insights {
  display: grid;
  gap: 24px;
}

.status-card,
.captcha-card,
.metric-card {
  padding: 24px;
}

.status-card {
  min-height: 210px;
  background:
    radial-gradient(circle at right bottom, rgba(200, 154, 100, 0.34), transparent 42%),
    #fff8f3;
}

.status-card h2 {
  font-size: 31px;
  line-height: 1.1;
}

.status-card p:not(.eyebrow),
.captcha-card p {
  margin-top: 14px;
  color: var(--muted);
}

.captcha-card {
  text-align: center;
}

.captcha-symbol {
  margin: 2px auto 18px;
  color: #d08a5f;
  font-size: 58px;
  font-weight: 950;
  letter-spacing: -0.12em;
  text-shadow: 16px 0 0 rgba(143, 165, 211, 0.7);
}

.captcha-card button {
  margin-top: 18px;
  padding: 12px 26px;
  color: var(--brown);
  border: 1px solid rgba(178, 118, 78, 0.28);
  background: #fff;
}

.metric-card {
  color: var(--muted);
}

.metric-card strong {
  display: block;
  margin: 8px 0 14px;
  color: var(--ink);
  font-size: 42px;
}

.progress {
  height: 10px;
  overflow: hidden;
  border-radius: 999px;
  background: #eaded8;
}

.progress span {
  display: block;
  width: 78%;
  height: 100%;
  border-radius: inherit;
  background: var(--blue);
}

.features {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 24px;
}

.features article {
  padding: 28px;
  border-radius: 30px;
}

.features span {
  color: var(--blue);
  font-weight: 900;
}

.features h3 {
  margin-top: 18px;
  font-size: 24px;
}

.features p {
  margin: 12px 0 0;
  color: var(--muted);
}

.content-panel {
  min-height: 0;
  overflow-y: auto;
  padding: 30px;
  border: 1px solid var(--stroke);
  border-radius: 30px;
  background: rgba(255, 251, 248, 0.88);
  box-shadow: var(--shadow);
}

.panel-header.light {
  border-bottom-color: rgba(95, 88, 84, 0.12);
}

.panel-header.light h2 {
  color: var(--ink);
}

.symptom-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
  margin-top: 24px;
}

.choice-card,
.history-list article,
.profile-grid article,
.profile-note {
  border: 1px solid rgba(95, 88, 84, 0.12);
  border-radius: 24px;
  background: #fff;
}

.choice-card {
  padding: 22px;
}

.choice-card.active {
  background: #eef3ff;
}

.choice-card span {
  color: var(--blue);
  font-weight: 900;
}

.choice-card h3,
.history-list h3,
.profile-note h3 {
  margin: 12px 0 8px;
  color: var(--ink);
}

.choice-card p,
.history-list p,
.profile-note p {
  margin: 0;
  color: var(--muted);
}

.symptom-form {
  display: grid;
  gap: 16px;
  margin-top: 24px;
}

.symptom-form label {
  display: grid;
  gap: 10px;
  color: var(--muted);
  font-weight: 800;
}

textarea {
  min-height: 140px;
  resize: vertical;
  border: 1px solid rgba(95, 88, 84, 0.18);
  border-radius: 18px;
  padding: 16px;
  background: rgba(255, 255, 255, 0.85);
  color: var(--ink);
  font: inherit;
  outline: none;
}

textarea:focus {
  border-color: var(--blue);
  box-shadow: 0 0 0 4px rgba(143, 165, 211, 0.18);
}

.history-list {
  display: grid;
  gap: 16px;
  margin-top: 24px;
}

.history-list article {
  padding: 22px;
}

.history-list time {
  color: var(--blue);
  font-weight: 850;
}

.profile-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 16px;
  margin-top: 24px;
}

.profile-grid article {
  display: grid;
  gap: 8px;
  padding: 22px;
}

.profile-grid span {
  color: var(--muted);
  font-weight: 750;
}

.profile-grid strong {
  color: var(--ink);
  font-size: 22px;
}

.profile-note {
  margin-top: 16px;
  padding: 24px;
  background: #eef3ff;
}

@media (max-width: 1180px) {
  .hero-section,
  .workspace,
  .features {
    grid-template-columns: 1fr;
  }

  .hero-section {
    padding: 42px;
  }

  .login-card {
    max-width: 420px;
  }
}
